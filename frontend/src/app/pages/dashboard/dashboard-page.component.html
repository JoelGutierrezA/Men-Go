<section class="page-shell dashboard-page">
  <div class="dashboard-page__workspace">
    <mat-card class="dashboard-page__card dashboard-page__card--editor">

      <mat-card-content class="dashboard-page__editor">
        @switch (currentStep()) {
          @case (2) {
            <app-categories-step
              (backRequested)="goBack()"
              (continueRequested)="goNext()"
            />
          }
          @case (3) {
            <app-products-step
              (backRequested)="goBack()"
              (continueRequested)="goNext()"
            />
          }
          @case (4) {
            <app-design-step
              (backRequested)="goBack()"
              (continueRequested)="goNext()"
            />
          }
          @case (5) {
            <app-review-step
              (backRequested)="goBack()"
              (continueRequested)="goNext()"
              (stepRequested)="goToReviewTarget($event)"
            />
          }
          @case (6) {
            <app-publish-step
              (backRequested)="goBack()"
              (panelRequested)="goToStep(2)"
            />
          }
        }

        @if (validationError()) {
          <p class="dashboard-page__error">{{ validationError() }}</p>
        }
      </mat-card-content>
    </mat-card>

    <mat-card
      class="dashboard-page__card dashboard-page__card--preview"
      [class.dashboard-page__card--preview-collapsed]="previewCollapsed()"
    >
      <mat-card-header class="dashboard-page__preview-header dashboard-page__preview-header--with-actions">
        <div class="dashboard-page__preview-heading">
          <mat-card-title>Previsualización</mat-card-title>
        </div>
        <div class="dashboard-page__preview-actions">
          <button
            mat-icon-button
            type="button"
            [attr.aria-label]="previewCollapsed() ? 'Mostrar previsualización' : 'Ocultar previsualización'"
            (click)="togglePreview()"
          >
            <mat-icon aria-hidden="true">
              {{ previewCollapsed() ? 'visibility' : 'visibility_off' }}
            </mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            aria-label="Abrir previsualización grande"
            (click)="openLargePreview()"
          >
            <mat-icon aria-hidden="true">open_in_full</mat-icon>
          </button>
        </div>
      </mat-card-header>

      @if (!previewCollapsed()) {
        <mat-card-content class="dashboard-page__preview">
          <app-menu-preview />
        </mat-card-content>
      }
    </mat-card>
  </div>

  @if (previewExpanded()) {
    <div
      class="dashboard-page__preview-modal"
      role="dialog"
      aria-modal="true"
      aria-label="Previsualización ampliada del menú"
    >
      <div class="dashboard-page__preview-modal-content">
        <button
          mat-icon-button
          type="button"
          aria-label="Cerrar previsualización ampliada"
          (click)="closeLargePreview()"
        >
          <mat-icon aria-hidden="true">close</mat-icon>
        </button>
        <app-menu-preview />
      </div>
    </div>
  }
</section>
