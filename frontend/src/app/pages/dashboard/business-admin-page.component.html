<section class="page-shell dashboard-page">
  <div class="dashboard-page__workspace">
    <mat-card class="dashboard-page__card dashboard-page__card--editor">
      <mat-card-content class="dashboard-page__editor">
        <app-business-step (continueRequested)="confirmSaved()" />

        @if (savedMessage()) {
          <span class="dashboard-page__saved-badge">{{ savedMessage() }}</span>
        }
      </mat-card-content>
    </mat-card>

    <mat-card class="dashboard-page__card dashboard-page__card--preview">
      <mat-card-header class="dashboard-page__preview-header dashboard-page__preview-header--centered">
        <div class="dashboard-page__preview-heading">
          <mat-card-title>Previsualización</mat-card-title>
        </div>
      </mat-card-header>

      <mat-card-content class="dashboard-page__preview">
        <app-menu-preview />
      </mat-card-content>
    </mat-card>
  </div>
</section>
