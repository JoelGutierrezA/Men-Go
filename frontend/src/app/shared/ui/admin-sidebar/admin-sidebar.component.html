<aside class="sidebar">
  <header class="sidebar__header">
    <span class="sidebar__eyebrow">{{ eyebrow() }}</span>
    <h2>{{ title() }}</h2>
    <p>{{ description() }}</p>
  </header>

  <mat-divider></mat-divider>

  <nav class="sidebar__nav" mat-nav-list>
    @for (item of items(); track item.route) {
      @if (item.disabled) {
        <button mat-list-item type="button" disabled>
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
          <span matListItemMeta>Proximamente</span>
        </button>
      } @else {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="navigate.emit()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    }
  </nav>

  <div class="sidebar__footer">
    <span>{{ footerLabel() }}</span>
    <p>{{ footerText() }}</p>
  </div>
</aside>
