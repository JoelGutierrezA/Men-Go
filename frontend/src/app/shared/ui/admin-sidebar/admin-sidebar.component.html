<aside class="sidebar">
  <header class="sidebar__header">
    <span class="sidebar__eyebrow">Administración</span>
    <h2>Base del panel</h2>
    <p>
      Estructura preparada para crecer por módulos sin mezclar UI, acceso y
      dominio.
    </p>
  </header>

  <mat-divider></mat-divider>

  <nav class="sidebar__nav" mat-nav-list>
    @for (item of items(); track item.route) {
      @if (item.disabled) {
        <button mat-list-item type="button" disabled>
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
          <span matListItemMeta>Próximamente</span>
        </button>
      } @else {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="navigate.emit()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    }
  </nav>

  <div class="sidebar__footer">
    <span>Fase 1</span>
    <p>Sin persistencia ni lógica de negocio aún.</p>
  </div>
</aside>
